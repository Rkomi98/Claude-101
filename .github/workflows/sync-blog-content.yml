name: Sync Blog Content

on:
  push:
    paths:
      - 'Corso base/*.md'
      - 'scripts/generate-blog-content.mjs'
      - '.github/workflows/sync-blog-content.yml'

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog content
        run: node scripts/generate-blog-content.mjs

      - name: Commit generated file
        run: |
          if git diff --quiet -- blog-content.generated.js; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog-content.generated.js
          git commit -m "chore: sync generated blog content [skip ci]"
          git push
