name: Deploy Blog

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'blog-*.css'
      - 'blog-*.jsx'
      - 'blog-content.generated.js'
      - 'blog-content.runtime.js'
      - 'Assets/**'
      - 'Corso base/*.md'
      - 'scripts/generate-blog-content.mjs'
      - '.github/workflows/sync-blog-content.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog content
        run: node scripts/generate-blog-content.mjs

      - name: Prepare static site artifact
        run: |
          mkdir -p dist
          cp index.html dist/
          cp blog-*.css dist/
          cp blog-*.jsx dist/
          cp blog-content.generated.js dist/
          cp blog-content.runtime.js dist/
          cp -R Assets dist/Assets
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
